name: Deploy Mini Render to EC2

on:
  push:
    branches:
      - main
      - kubernetes-migration

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            cd ~/mini-render

            git fetch origin
            git reset --hard origin/kubernetes-migration

            # Build backend image for Kubernetes
            sudo docker build -t mini-render-backend:local ./backend

            # Import Docker image into k3s/containerd
            sudo docker save mini-render-backend:local | sudo k3s ctr images import -

            # Apply Kubernetes config
            sudo kubectl apply -f k8s/rbac.yaml
            sudo kubectl apply -f k8s/postgres.yaml
            sudo kubectl apply -f k8s/redis.yaml
            sudo kubectl apply -f k8s/backend.yaml
            sudo kubectl apply -f k8s/worker.yaml

            # Restart Kubernetes backend/worker
            sudo kubectl rollout restart deployment/backend
            sudo kubectl rollout restart deployment/worker

            sudo kubectl rollout status deployment/backend
            sudo kubectl rollout status deployment/worker

            # Ensure DB tables exist
            sudo kubectl exec deployment/backend -- python create_tables.py

            # Build and deploy frontend
            cd frontend
            npm install
            npm run build

            sudo rm -rf /var/www/mini-render/*
            sudo cp -r dist/* /var/www/mini-render/

            # Reload Nginx
            sudo nginx -t
            sudo systemctl reload nginx