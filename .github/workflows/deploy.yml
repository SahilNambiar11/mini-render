name: Deploy Mini Render to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            cd ~/mini-render
            git pull origin main

            cd backend
            source venv/bin/activate
            pip install -r requirements.txt

            sudo systemctl kill -s SIGKILL mini-render-backend || true
            sleep 2
            sudo systemctl reset-failed mini-render-backend || true
            sudo systemctl start mini-render-backend

            sudo systemctl restart mini-render-worker

            cd ../frontend
            npm install
            npm run build

            sudo rm -rf /var/www/mini-render/*
            sudo cp -r dist/* /var/www/mini-render/

            sudo nginx -t
            sudo systemctl reload nginx