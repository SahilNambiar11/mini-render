apiVersion: v1
kind: ServiceAccount
metadata:
  name: mini-render
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mini-render-role
  namespace: default
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["services", "pods"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mini-render-rolebinding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: mini-render
    namespace: default
roleRef:
  kind: Role
  name: mini-render-role
  apiGroup: rbac.authorization.k8s.io
